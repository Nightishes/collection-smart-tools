version: "3.8"

services:
  # ClamAV antivirus daemon
  clamav:
    image: clamav/clamav:1.3.0 # Pinned version for security
    container_name: collection-tools-clamav
    user: "clamav:clamav"
    ports:
      - "3310:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    environment:
      - CLAMAV_NO_FRESHCLAM=false # Enable automatic virus definition updates
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s # ClamAV takes time to load virus definitions
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    networks:
      - collection-tools

  # Redis cache for improved performance
  redis:
    image: redis:7.2.3-alpine # Pinned version for security
    container_name: collection-tools-redis
    user: "redis:redis"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    networks:
      - collection-tools

  # Optional: Existing services can be added here
  # pdf2html:
  #   image: pdf2html:latest
  #   ...

networks:
  collection-tools:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.name: collection-tools-bridge
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  clamav-data:
    driver: local
  redis-data:
    driver: local
