version: "3.8"

services:
  # ClamAV antivirus daemon
  clamav:
    image: clamav/clamav:1.4.1 # Pinned version for security
    container_name: collection-tools-clamav
    user: "clamav:clamav"
    ports:
      - "3310:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    environment:
      - CLAMAV_NO_FRESHCLAM=false # Enable automatic virus definition updates
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s # ClamAV takes time to load virus definitions
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    networks:
      - collection-tools

  # Redis cache for improved performance
  redis:
    image: redis:7.2.3-alpine # Pinned version for security
    container_name: collection-tools-redis
    user: "redis:redis"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    restart: unless-stopped
    networks:
      - collection-tools

  # Tesseract OCR service
  tesseract:
    build:
      context: .
      dockerfile: Dockerfile.tesseract
    image: collection-tools-tesseract:latest
    container_name: collection-tools-tesseract
    volumes:
      - ./uploads:/ocr:rw
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    networks:
      - collection-tools
    entrypoint: ["/bin/sh", "-c"]
    command: ["tail -f /dev/null"]

  # Optional: Existing services can be added here
  # pdf2html:
  #   image: pdf2html:latest
  #   ...

networks:
  collection-tools:
    driver: bridge

volumes:
  clamav-data:
    driver: local
  redis-data:
    driver: local
